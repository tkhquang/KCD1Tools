; KCD1_TPVToggle.ini
; Toggle between first-person and third-person camera views with hotkeys.
;
; --- Hotkeys ---
; Format: modifier+trigger (modifiers joined with +, last segment = trigger key)
;   - Named keys: F3, V, Numpad1, Mouse4, Gamepad_A, etc.
;   - Modifiers: Ctrl, Shift, Alt (or LCtrl, RCtrl, LShift, RShift, LAlt, RAlt)
;   - Multiple independent combos: F3,Gamepad_LB+Gamepad_A  (F3 alone OR hold LB + press A)
;   - If empty, the binding is disabled.
;
; Examples:
;   ToggleKey = F3                         ; F3 key
;   ToggleKey = Ctrl+F3                    ; Ctrl + F3
;   ToggleKey = F3,F4                      ; F3 or F4
;   ToggleKey = F3,Gamepad_LB+Gamepad_A   ; F3 alone OR (hold LB + press A)
;   ToggleKey =                            ; disabled (no binding)
;
; Refer to https://github.com/tkhquang/DetourModKit?tab=readme-ov-file#supported-input-names
; for the full list of supported input names.

[Settings]
; ToggleKey: Key(s) to toggle between first-person and third-person views.
; Default: F3
ToggleKey = F3

; FPVKey: Key(s) that always force first-person view.
; Default: (empty)
FPVKey =

; TPVKey: Key(s) that always force third-person view.
; Default: (empty)
TPVKey =

; LogLevel: Trace, Debug, Info, Warning, Error
; Default: Info (use Debug for troubleshooting)
LogLevel = Info
